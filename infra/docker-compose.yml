services:
  finch-postgres:
    image: pgvector/pgvector:pg16
    container_name: finch-postgres
    environment:
      POSTGRES_USER: finch
      POSTGRES_PASSWORD: finch
      POSTGRES_DB: finch
    ports:
      - '5432:5432'
    volumes:
      - finch_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U finch -d finch']
      interval: 5s
      timeout: 5s
      retries: 10

  finch-redis:
    image: redis:7-alpine
    container_name: finch-redis
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  finch-temporal:
    image: temporalio/auto-setup:1.24
    container_name: finch-temporal
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: finch
      POSTGRES_PWD: finch
      POSTGRES_SEEDS: finch-postgres
    ports:
      - '7233:7233'
    depends_on:
      finch-postgres:
        condition: service_healthy

  finch-temporal-ui:
    image: temporalio/ui:2.31.2
    container_name: finch-temporal-ui
    environment:
      TEMPORAL_ADDRESS: finch-temporal:7233
    ports:
      - '8080:8080'
    depends_on:
      - finch-temporal

  finch-grafana:
    image: grafana/grafana:11.1.0
    container_name: finch-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: finch
      GF_AUTH_ANONYMOUS_ENABLED: 'true'
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    ports:
      - '3030:3000'
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    extra_hosts:
      - 'host.docker.internal:host-gateway'

volumes:
  finch_postgres_data:
