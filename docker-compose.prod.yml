# Finch — Production Docker Compose
# Usage:
#   1. Copy .env.example to .env and fill in secrets
#   2. docker compose -f docker-compose.prod.yml up -d --build
#
# This file defines the complete Finch stack:
#   - finch-postgres  (pgvector/pg16)
#   - finch-redis     (Redis 7)
#   - finch-temporal  (Temporal auto-setup 1.24)
#   - finch-temporal-ui
#   - finch-api       (NestJS backend)
#   - finch-web       (React frontend via nginx)
#   - finch-prometheus
#   - finch-grafana

services:
  # ── Data stores ──────────────────────────────────────────────────────────────
  finch-postgres:
    image: pgvector/pgvector:pg16
    container_name: finch-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-finch}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-finch}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - finch_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-finch} -d ${POSTGRES_DB:-finch}']
      interval: 5s
      timeout: 5s
      retries: 10

  finch-redis:
    image: redis:7-alpine
    container_name: finch-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - finch_redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Temporal ─────────────────────────────────────────────────────────────────
  finch-temporal:
    image: temporalio/auto-setup:1.24
    container_name: finch-temporal
    restart: unless-stopped
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-finch}
      POSTGRES_PWD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_SEEDS: finch-postgres
    ports:
      - '${TEMPORAL_PORT:-7233}:7233'
    depends_on:
      finch-postgres:
        condition: service_healthy

  finch-temporal-ui:
    image: temporalio/ui:2.31.2
    container_name: finch-temporal-ui
    restart: unless-stopped
    environment:
      TEMPORAL_ADDRESS: finch-temporal:7233
    ports:
      - '${TEMPORAL_UI_PORT:-8080}:8080'
    depends_on:
      - finch-temporal

  # ── Application ──────────────────────────────────────────────────────────────
  finch-api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: finch-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-finch}:${POSTGRES_PASSWORD}@finch-postgres:5432/${POSTGRES_DB:-finch}
      REDIS_URL: redis://:${REDIS_PASSWORD}@finch-redis:6379
      REDIS_HOST: finch-redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      TEMPORAL_ADDRESS: finch-temporal:7233
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?Set ENCRYPTION_KEY in .env}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CORS_ORIGIN: ${FRONTEND_URL:-http://localhost:3000}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      HARNESS_ID: ${HARNESS_ID:-default}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      TRIGGER_PREFIX: ${TRIGGER_PREFIX:-@finch}
    ports:
      - '${API_PORT:-3001}:3001'
    depends_on:
      finch-postgres:
        condition: service_healthy
      finch-redis:
        condition: service_healthy
      finch-temporal:
        condition: service_started

  finch-web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3001}
    container_name: finch-web
    restart: unless-stopped
    ports:
      - '${WEB_PORT:-3000}:3000'
    depends_on:
      - finch-api

  # ── Observability ────────────────────────────────────────────────────────────
  finch-prometheus:
    image: prom/prometheus:v2.53.0
    container_name: finch-prometheus
    restart: unless-stopped
    ports:
      - '${PROMETHEUS_PORT:-9090}:9090'
    volumes:
      - ./infra/prometheus/prometheus.prod.yml:/etc/prometheus/prometheus.yml

  finch-grafana:
    image: grafana/grafana:11.1.0
    container_name: finch-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-finch}
      GF_AUTH_ANONYMOUS_ENABLED: 'false'
    ports:
      - '${GRAFANA_PORT:-3030}:3000'
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards
      - finch_grafana_data:/var/lib/grafana
    depends_on:
      - finch-prometheus

volumes:
  finch_postgres_data:
  finch_redis_data:
  finch_grafana_data:
