name: CI

on:
  push:
  pull_request:

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile

  typecheck-api:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter api prisma generate
      - run: pnpm --filter api exec tsc --noEmit

  typecheck-web:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter web exec tsc --noEmit

  unit-tests:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter api prisma generate
      - run: pnpm --filter api test run
      - run: pnpm --filter web test run

  integration-tests:
    runs-on: ubuntu-latest
    needs: install
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: finch
          POSTGRES_PASSWORD: finch
          POSTGRES_DB: finch
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U finch -d finch"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter api prisma generate
      - run: pnpm --filter api prisma migrate deploy
        env:
          DATABASE_URL: postgresql://finch:finch@localhost:5432/finch
      - run: pnpm --filter api prisma db seed
        env:
          DATABASE_URL: postgresql://finch:finch@localhost:5432/finch
      - run: pnpm --filter api test:integration
        env:
          DATABASE_URL: postgresql://finch:finch@localhost:5432/finch
          REDIS_URL: redis://localhost:6379

  e2e-tests:
    runs-on: ubuntu-latest
    needs: install
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: finch
          POSTGRES_PASSWORD: finch
          POSTGRES_DB: finch
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U finch -d finch"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      temporal:
        image: temporalio/auto-setup:1.24
        env:
          DB: postgres12
          DB_PORT: 5432
          POSTGRES_USER: finch
          POSTGRES_PWD: finch
          POSTGRES_SEEDS: postgres
        ports:
          - 7233:7233
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter api prisma generate
      - run: pnpm --filter api prisma migrate deploy
        env:
          DATABASE_URL: postgresql://finch:finch@localhost:5432/finch
      - run: pnpm --filter api prisma db seed
        env:
          DATABASE_URL: postgresql://finch:finch@localhost:5432/finch
      - run: npx playwright install chromium --with-deps
      - name: Wait for Temporal to be ready
        run: |
          echo "Waiting for Temporal gRPC on port 7233..."
          for i in $(seq 1 120); do
            if nc -z localhost 7233 2>/dev/null; then
              echo "Temporal port is open! Waiting 10s for full initialization..."
              sleep 10
              echo "Temporal is ready!"
              break
            fi
            if [ $i -eq 120 ]; then
              echo "Temporal failed to start within 10 minutes"
              exit 1
            fi
            sleep 5
          done
      - name: Start API server
        run: pnpm --filter api dev &
        env:
          DATABASE_URL: postgresql://finch:finch@localhost:5432/finch
          REDIS_URL: redis://localhost:6379
          TEMPORAL_ADDRESS: localhost:7233
          JWT_SECRET: e2e-test-secret
          ANTHROPIC_API_KEY: sk-test-placeholder
          OPENAI_API_KEY: sk-test-placeholder
      - name: Start frontend
        run: pnpm --filter web dev &
      - name: Wait for servers to be ready
        run: |
          echo "Waiting for API..."
          for i in $(seq 1 90); do
            if curl -sf http://localhost:3001/health > /dev/null 2>&1; then
              echo "API is up!"
              break
            fi
            if [ $i -eq 90 ]; then
              echo "API failed to start within timeout"
              exit 1
            fi
            sleep 3
          done
          echo "Waiting for frontend..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000 > /dev/null 2>&1; then
              echo "Frontend is up!"
              break
            fi
            sleep 2
          done
      - name: Run Playwright tests
        run: npx playwright test
        env:
          DATABASE_URL: postgresql://finch:finch@localhost:5432/finch
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: e2e-test-secret
